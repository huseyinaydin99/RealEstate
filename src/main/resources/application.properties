spring.application.name=RealEstate
spring.datasource.url=jdbc:h2:file:./data/realestatedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=tr.com.huseyinaydin.dto
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.tr.com.huseyinaydin=DEBUG
