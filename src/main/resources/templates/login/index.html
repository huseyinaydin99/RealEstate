<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Real Estate | Professional Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/AdminPanel/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            transform: translateY(0);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e3c72;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-floating > .form-control {
            border-radius: 10px;
            border: 2px solid #eee;
            padding: 1rem 0.75rem;
        }
        .form-floating > .form-control:focus {
            border-color: #1e3c72;
            box-shadow: none;
        }
        .btn-login {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-login:hover {
            background: linear-gradient(to right, #2a5298, #1e3c72);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
            color: white;
        }
        .forgot-password {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .forgot-password:hover {
            color: #1e3c72;
        }
        .register-link {
            color: #1e3c72;
            font-weight: 600;
            text-decoration: none;
        }
        .input-group-text {
            background: transparent;
            border: 2px solid #eee;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #1e3c72;
        }
        .form-control-with-icon {
            border-left: none !important;
            border-radius: 0 10px 10px 0 !important;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-city"></i>
            <span>RealEstate</span>
        </div>
        <h4 class="text-center mb-4" style="color: #444; font-weight: 500;">Hoş Geldiniz</h4>
        <form th:action="@{/Login/Index}" method="post" id="loginForm">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="text" name="username" class="form-control form-control-with-icon" id="username" placeholder="Kullanıcı Adı" required>
                    <label for="username">Kullanıcı Adı</label>
                </div>
            </div>
            <div class="input-group mb-4">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="password" name="password" class="form-control form-control-with-icon" id="password" placeholder="Şifre" required>
                    <label for="password">Şifre</label>
                </div>
            </div>
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe" style="font-size: 0.9rem; color: #666;">Beni Hatırla</label>
                </div>
                <a href="#" class="forgot-password">Şifremi Unuttum?</a>
            </div>
            <button type="submit" class="btn btn-login w-100 mb-4">Giriş Yap</button>
            <p class="text-center mb-0" style="color: #666;">
                Hesabınız yok mu? <a th:href="@{/Register/Index}" class="register-link">Şimdi Kayıt Ol</a>
            </p>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script th:inline="javascript">
        $(document).ready(function() {
            /*[# th:if="${error}"]*/
            var error = /*[[${error}]]*/ 'default';
            toastr.error(error, 'Hata', {
                closeButton: true,
                progressBar: true,
                positionClass: "toast-top-right",
                timeOut: 5000
            });
            /*[/]*/
        });
    </script>
</body>
</html>
