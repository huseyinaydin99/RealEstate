<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head}"></head>
<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <div th:replace="~{layout/estateagent_layout :: sidebar}"></div>
        <div class="content">
            <nav th:replace="~{layout/estateagent_layout :: navbar}"></nav>
            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Yeni İlan Girişi</h6>
                    <form th:action="@{/estateagent/adverts/create}" th:object="${product}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">İlan Başlığı</label>
                            <input type="text" th:field="*{title}" class="form-control" id="title">
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Fiyat</label>
                            <input type="text" th:field="*{price}" class="form-control" id="price">
                        </div>
                        <div class="mb-3">
                            <label for="city" class="form-label">Şehir</label>
                            <input type="text" th:field="*{city}" class="form-control" id="city">
                        </div>
                        <div class="mb-3">
                            <label for="district" class="form-label">İlçe</label>
                            <input type="text" th:field="*{district}" class="form-control" id="district">
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Adres</label>
                            <textarea th:field="*{address}" class="form-control" id="address"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="coverImage" class="form-label">Kapak Fotoğrafı</label>
                            <input type="text" th:field="*{coverImage}" class="form-control" id="coverImage">
                        </div>
                        <div class="mb-3">
                            <label for="type" class="form-label">İlan Türü</label>
                            <input type="text" th:field="*{type}" class="form-control" id="type">
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Kategori</label>
                            <select th:field="*{productCategory}" class="form-control" id="category">
                                <option th:each="cat : ${categories}" th:value="${cat.categoryID}" th:text="${cat.categoryName}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">İlanı Kaydet</button>
                    </form>
                </div>
            </div>
            <div th:replace="~{layout/admin_layout :: footer}"></div>
        </div>
    </div>
    <div th:replace="~{layout/admin_layout :: scripts}"></div>
</body>
</html>
