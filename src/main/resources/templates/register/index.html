<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Real Estate | Kayıt Ol</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/AdminPanel/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('/RealEstatePanel/assets/images/about.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            transform: translateY(0);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 95vh;
            overflow-y: auto;
        }
        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3c72;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-floating > .form-control {
            border-radius: 10px;
            border: 2px solid #eee;
            padding: 1rem 0.75rem;
        }
        .form-floating > .form-control:focus {
            border-color: #1e3c72;
            box-shadow: none;
        }
        .btn-register {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-register:hover {
            background: linear-gradient(to right, #2a5298, #1e3c72);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
            color: white;
        }
        .login-link {
            color: #1e3c72;
            font-weight: 600;
            text-decoration: none;
        }
        .input-group-text {
            background: transparent;
            border: 2px solid #eee;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #1e3c72;
            width: 45px;
            display: flex;
            justify-content: center;
        }
        .form-control-with-icon {
            border-left: none !important;
            border-radius: 0 10px 10px 0 !important;
        }
        .register-card::-webkit-scrollbar {
            width: 5px;
        }
        .register-card::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .register-card::-webkit-scrollbar-thumb {
            background: #1e3c72;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand-logo">
            <i class="fas fa-city"></i>
            <span>RealEstate</span>
        </div>
        <h4 class="text-center mb-4" style="color: #444; font-weight: 500;">Yeni Hesap Oluştur</h4>
        <form th:action="@{/Register/Index}" method="post">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="text" name="name" class="form-control form-control-with-icon" id="name" placeholder="Adınız Soyadınız" required>
                    <label for="name">Adınız Soyadınız</label>
                </div>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="text" name="userName" class="form-control form-control-with-icon" id="userName" placeholder="Kullanıcı Adı" required>
                    <label for="userName">Kullanıcı Adı</label>
                </div>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="email" name="email" class="form-control form-control-with-icon" id="email" placeholder="E-posta Adresi" required>
                    <label for="email">E-posta Adresi</label>
                </div>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="text" name="phoneNumber" class="form-control form-control-with-icon" id="phoneNumber" placeholder="Telefon Numarası" required>
                    <label for="phoneNumber">Telefon Numarası</label>
                </div>
            </div>
            <div class="input-group mb-4">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <div class="form-floating flex-grow-1">
                    <input type="password" name="password" class="form-control form-control-with-icon" id="password" placeholder="Şifre" required>
                    <label for="password">Şifre</label>
                </div>
            </div>
            <button type="submit" class="btn btn-register w-100 mb-4">Kayıt Ol</button>
            <p class="text-center mb-0" style="color: #666;">
                Zaten hesabınız var mı? <a th:href="@{/Login/Index}" class="login-link">Giriş Yap</a>
            </p>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
</body>
</html>
