<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Real Estate Kayıt Ol</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/AdminPanel/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/AdminPanel/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <div class="container-fluid">
            <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
                <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                    <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <a href="/" class="">
                                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>Real Estate</h3>
                            </a>
                            <h3>Kayıt Ol</h3>
                        </div>
                        <form th:action="@{/Register/Index}" th:object="${appUser}" method="post">
                            <div class="form-floating mb-3">
                                <input type="text" th:field="*{name}" class="form-control" id="floatingName" placeholder="Adınız" />
                                <label for="floatingName">Adınız</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" th:field="*{userName}" class="form-control" id="floatingUserName" placeholder="Kullanıcı Adınız" />
                                <label for="floatingUserName">Kullanıcı Adınız</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" th:field="*{password}" class="form-control" id="floatingPassword" placeholder="Şifreniz" />
                                <label for="floatingPassword">Şifreniz</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" th:field="*{email}" class="form-control" id="floatingEmail" placeholder="E-Mail" />
                                <label for="floatingEmail">E-Mail</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" th:field="*{phoneNumber}" class="form-control" id="floatingPhone" placeholder="Telefon Numarası" />
                                <label for="floatingPhone">Telefon Numarası</label>
                            </div>
                            <button type="submit" class="btn btn-primary py-3 w-100 mb-4">Kayıt Ol</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
