<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head}"></head>
<body>
    <div class="container-fluid position-relative d-flex p-0">
        <div th:replace="~{layout/admin_layout :: sidebar}"></div>
        <div class="content">
            <nav th:replace="~{layout/admin_layout :: navbar}"></nav>
            <div class="container-fluid pt-4 px-4">
                <div class="bg-white text-center rounded p-4 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h6 class="mb-0">Kategori Listesi</h6>
                        <a th:href="@{/admin/categories/create}" class="btn btn-primary">Yeni Kategori Ekle</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table text-start align-middle table-bordered table-hover mb-0">
                            <thead>
                                <tr class="text-dark">
                                    <th scope="col">#</th>
                                    <th scope="col">Kategori Adı</th>
                                    <th scope="col">Durum</th>
                                    <th scope="col">İşlemler</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${categories}">
                                    <td th:text="${item.getCategoryID()}"></td>
                                    <td th:text="${item.getCategoryName()}"></td>
                                    <td th:text="${item.isCategoryStatus() ? 'Aktif' : 'Pasif'}"></td>
                                    <td>
                                        <a class="btn btn-sm btn-danger" th:href="@{'/admin/categories/delete/' + ${item.getCategoryID()}}">Sil</a>
                                        <a class="btn btn-sm btn-primary" th:href="@{'/admin/categories/update/' + ${item.getCategoryID()}}">Güncelle</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div th:replace="~{layout/admin_layout :: footer}"></div>
        </div>
    </div>
    <div th:replace="~{layout/admin_layout :: scripts}"></div>
</body>
</html>
