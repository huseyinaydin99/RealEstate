<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head}"></head>
<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <div th:replace="~{layout/admin_layout :: sidebar}"></div>
        <div class="content">
            <nav th:replace="~{layout/admin_layout :: navbar}"></nav>
            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Kategori Güncelleme Sayfası</h6>
                    <form th:action="@{/admin/categories/update}" th:object="${category}" method="post">
                        <input type="hidden" name="categoryID" th:value="${category.getCategoryID()}">
                        <div class="mb-3">
                            <label for="categoryName" class="form-label">Kategori Adı</label>
                            <input type="text" name="categoryName" th:value="${category.getCategoryName()}" class="form-control" id="categoryName">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="categoryStatus" th:checked="${category.isCategoryStatus()}" class="form-check-input" id="categoryStatus">
                            <label class="form-check-label" for="categoryStatus">Durum</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Güncelle</button>
                    </form>
                </div>
            </div>
            <div th:replace="~{layout/admin_layout :: footer}"></div>
        </div>
    </div>
    <div th:replace="~{layout/admin_layout :: scripts}"></div>
</body>
</html>
