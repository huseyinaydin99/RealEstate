<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head}"></head>
<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <div th:replace="~{layout/admin_layout :: sidebar}"></div>
        <div class="content">
            <nav th:replace="~{layout/admin_layout :: navbar}"></nav>
            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Profil Bilgilerim</h6>
                    <form th:action="@{/Profile/Update}" th:object="${profile}" method="post">
                        <input type="hidden" th:field="*{userId}" />
                        <input type="hidden" th:field="*{userRole}" />
                        
                        <div class="mb-3">
                            <label class="form-label">Adı</label>
                            <input type="text" th:field="*{name}" class="form-control" />
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Kullanıcı Adı</label>
                            <input type="text" th:field="*{userName}" class="form-control" />
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Şifre</label>
                            <input type="text" th:field="*{password}" class="form-control" />
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">E-Mail</label>
                            <input type="email" th:field="*{email}" class="form-control" />
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Telefon Numarası</label>
                            <input type="tel" th:field="*{phoneNumber}" class="form-control" />
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Görsel Url</label>
                            <input type="text" th:field="*{userImageUrl}" class="form-control" />
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Bilgilerimi Kaydet</button>
                    </form>
                </div>
            </div>
            <div th:replace="~{layout/admin_layout :: footer}"></div>
        </div>
    </div>
    <div th:replace="~{layout/admin_layout :: scripts}"></div>
</body>
</html>
