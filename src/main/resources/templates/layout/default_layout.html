<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>RealEstate - Hayalinizdeki Eve Bir Adım Uzaktasınız</title>
    <link rel="icon" type="image/png" th:href="@{/home.png}" />
    <link href="//fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/RealEstatePanel/assets/css/style-starter.css}">
</head>
<body>
    <header id="site-header" class="fixed-top" th:fragment="navbar">
        <div class="container">
            <nav class="navbar navbar-expand-lg stroke px-0">
                <h1>
                    <a class="navbar-brand" th:href="@{/}">
                        <span>Real</span>Estate
                    </a>
                </h1>
                <button class="navbar-toggler  collapsed bg-gradient" type="button" data-toggle="collapse"
                        data-target="#navbarExporter" aria-controls="navbarExporter" aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon fa icon-expand fa-bars"></span>
                    <span class="navbar-toggler-icon fa icon-close fa-times"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarExporter">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active">
                            <a class="nav-link" th:href="@{/}">Ana Sayfa</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products}">İlanlar</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <div th:fragment="footer">
        <section class="w3l-footer-29-main">
            <div class="footer-29 py-5">
                <div class="container py-lg-4">
                    <p class="copy-footer-29 text-center">© 2026 RealEstate. Tüm Hakları Saklıdır.</p>
                </div>
            </div>
        </section>
    </div>

    <div th:fragment="scripts">
        <script th:src="@{/RealEstatePanel/assets/js/jquery-3.3.1.min.js}"></script>
        <script th:src="@{/RealEstatePanel/assets/js/theme-change.js}"></script>
        <script th:src="@{/RealEstatePanel/assets/js/bootstrap.min.js}"></script>
    </div>
</body>
</html>
