<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:fragment="head">
    <meta charset="utf-8">
    <title>Real Estate - Kullanıcı Paneli</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" type="image/png" th:href="@{/icon-admin.png}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    <link th:href="@{/AdminPanel/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">
    <link th:href="@{/AdminPanel/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css}" rel="stylesheet" />
    <link th:href="@{/AdminPanel/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/AdminPanel/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="sidebar pe-4 pb-3" th:fragment="sidebar">
        <nav class="navbar bg-light navbar-light">
            <a th:href="@{/admin/dashboard}" class="navbar-brand mx-4 mb-3">
                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>Real Estate</h3>
            </a>
            <div class="d-flex align-items-center ms-4 mb-4">
                <div class="position-relative">
                    <img class="rounded-circle" th:src="${#authentication.principal.imageUrl != null ? #authentication.principal.imageUrl : '/user.png'}" alt="" style="width: 40px; height: 40px;">
                    <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                </div>
                <div class="ms-3">
                    <h6 class="mb-0">Admin Paneli</h6>
                    <span sec:authentication="name">Kullanıcı</span>
                </div>
            </div>
            <div class="navbar-nav w-100">
                <a th:href="@{/admin/dashboard}" class="nav-item nav-link"><i class="fa fa-tachometer-alt me-2"></i>Dashboard</a>
                <a th:href="@{/admin/statistics}" class="nav-item nav-link"><i class="fa fa-chart-bar me-2"></i>İstatistikler</a>
                <a th:href="@{/Profile/Index}" class="nav-item nav-link"><i class="fa fa-cog me-2"></i>Ayarlar</a>
                <div class="nav-item dropdown">
                    <a href="#" style="color:black;" class="nav-link dropdown-toggle" data-bs-toggle="dropdown"><i class="far fa-envelope me-2"></i>Mail İşlemleri</a>
                    <div class="dropdown-menu bg-transparent border-0">
                        <a th:href="@{/messages/inbox}" class="dropdown-item">Gelen Kutusu</a>
                        <a th:href="@{/messages/sendbox}" class="dropdown-item">Gönderilen Mesajlar</a>
                    </div>
                </div>
                <a th:href="@{/admin/categories}" class="nav-item nav-link"><i class="fa fa-layer-group me-2"></i>Kategoriler</a>
                <a th:href="@{/admin/products}" class="nav-item nav-link"><i class="fa fa-th me-2"></i>İlanlar</a>
                <a th:href="@{/admin/users}" class="nav-item nav-link"><i class="fa fa-user me-2"></i>Kullanıcılar</a>
                <a th:href="@{/}" class="nav-item nav-link"><i class="fa fa-home me-2"></i>Siteye Git</a>
                <a th:href="@{/logout}" class="nav-item nav-link"><i class="fa fa-times me-2"></i>Çıkış Yap</a>
            </div>
        </nav>
    </div>

    <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0" th:fragment="navbar">
        <a href="#" class="sidebar-toggler flex-shrink-0">
            <i class="fa fa-bars"></i>
        </a>
        <div class="navbar-nav align-items-center ms-auto">
            <div class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                    <img class="rounded-circle me-lg-2" th:src="${#authentication.principal.imageUrl != null ? #authentication.principal.imageUrl : '/user.png'}" alt="" style="width: 40px; height: 40px;">
                    <span class="d-none d-lg-inline-flex" sec:authentication="name">Kullanıcı</span>
                </a>
                <div class="dropdown-menu dropdown-menu-end bg-light border-0 rounded-0 rounded-bottom m-0">
                    <a th:href="@{/logout}" class="dropdown-item">Çıkış Yap</a>
                </div>
            </div>
        </div>
    </nav>

    <div th:fragment="footer">
        <div class="container-fluid pt-4 px-4">
            <div class="bg-light rounded-top p-4">
                <div class="row">
                    <div class="col-12 col-sm-6 text-center text-sm-start">
                        &copy; <a href="#">Real Estate</a>, Tüm Hakları Saklıdır.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:fragment="scripts">
        <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/AdminPanel/lib/chart/chart.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/easing/easing.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/waypoints/waypoints.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/owlcarousel/owl.carousel.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/tempusdominus/js/moment.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/tempusdominus/js/moment-timezone.min.js}"></script>
        <script th:src="@{/AdminPanel/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js}"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
        <script th:src="@{/AdminPanel/js/main.js}"></script>
        <script th:if="${error}">
            $(document).ready(function() {
                toastr.error('[[${error}]]');
            });
        </script>
        <script th:if="${message}">
            $(document).ready(function() {
                toastr.success('[[${message}]]');
            });
        </script>
    </div>
</body>
</html>
