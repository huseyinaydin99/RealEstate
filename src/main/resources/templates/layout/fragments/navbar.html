<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="navbar" id="site-header" class="fixed-top">
    <div class="container">
        <nav class="navbar navbar-expand-lg stroke px-0">
            <h1>
                <a class="navbar-brand" th:href="@{/}">
                    <span class="fa fa-home"></span> Real Estate
                </a>
            </h1>
            <button class="navbar-toggler collapsed bg-gradient" type="button" data-toggle="collapse"
                    data-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon fa icon-expand fa-bars"></span>
                <span class="navbar-toggler-icon fa icon-close fa-times"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                <ul class="navbar-nav ml-lg-5 mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/property}">İlanlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/property/search(searchKeyValue='', propertyCategoryId=0, city='')}">Arama</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                           data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Fırsatlar <span class="fa fa-angle-down"></span>
                        </a>
                        <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" th:href="@{/#popularLocations}">Popüler Lokasyonlar</a>
                            <a class="dropdown-item" th:href="@{/#discountOfDay}">Günün Fırsatı</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/about}">Hakkımızda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contact}">Bize Yazın</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/Login/Index}">Giriş Yap</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/Profile/Index}">Profilim</a>
                    </li>
                </ul>
                <div class="top-quote mt-lg-0">
                    <a th:href="@{/estateagent/adverts/create}" class="btn btn-style btn-primary">
                        <span class="fa fa-home"></span> İlan Ver
                    </a>
                </div>
                <div class="search mx-3">
                    <input class="search_box" type="checkbox" id="search_box">
                    <label class="fa fa-search" for="search_box"></label>
                    <div class="search_form">
                        <form th:action="@{/property/search}" method="GET">
                            <input type="text" name="searchKeyValue" placeholder="Aranacak ifadeyi girin...">
                            <input type="submit" value="Ara">
                        </form>
                    </div>
                </div>
            </div>

            <div class="mobile-position">
                <nav class="navigation">
                    <div class="theme-switch-wrapper">
                        <label class="theme-switch" for="checkbox">
                            <input type="checkbox" id="checkbox">
                            <div class="mode-container">
                                <i class="gg-sun"></i>
                                <i class="gg-moon"></i>
                            </div>
                        </label>
                    </div>
                </nav>
            </div>
        </nav>
    </div>
</header>
</html>
