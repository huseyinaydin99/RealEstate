<div xmlns:th="http://www.thymeleaf.org">
    <div class="col-lg-4 mt-lg-0 mt-5">
        <div class="sidebar-agent">
            <div class="agent-details">
                <img th:src="${appUser.userImageUrl}" class="img-fluid rounded-circle" alt="Emlakçı Görseli">
                <h4 class="mt-3" th:text="${appUser.name}"></h4>
                <p>Emlak Danışmanı</p>
                <ul class="agent-contact mt-3">
                    <li><span class="fa fa-phone"></span> <span th:text="${appUser.phoneNumber}"></span></li>
                    <li><span class="fa fa-envelope-o"></span> <span th:text="${appUser.email}"></span></li>
                </ul>
                <div class="agent-social mt-3">
                    <a href="#facebook" class="facebook"><span class="fa fa-facebook"></span></a>
                    <a href="#twitter" class="twitter"><span class="fa fa-twitter"></span></a>
                    <a href="#linkedin" class="linkedin"><span class="fa fa-linkedin"></span></a>
                </div>
            </div>
        </div>
    </div>
</div>
