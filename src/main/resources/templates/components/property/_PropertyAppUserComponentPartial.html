<div xmlns:th="http://www.thymeleaf.org">
    <div class="sidebar-agent bg-white shadow-sm rounded p-4 border-top border-primary" style="border-top-width: 4px !important; position: sticky; top: 100px;">
        <div class="agent-details text-center">
            <div class="agent-image-container mb-3">
                <img th:src="${appUser.userImageUrl}" class="img-fluid rounded-circle shadow-sm" alt="Emlakçı Görseli" style="width: 120px; height: 120px; object-fit: cover; border: 4px solid #fff;">
            </div>
            <h4 class="mt-2 mb-1" th:text="${appUser.name}" style="font-weight: 700; color: #333;"></h4>
            <span class="badge badge-light px-3 py-1 mb-3" style="color: #666; font-size: 13px;">Gayrimenkul Danışmanı</span>
            
            <ul class="agent-contact list-unstyled mt-2 mb-4 text-left">
                <li class="mb-2 d-flex align-items-center">
                    <span class="fa fa-phone mr-3 text-primary" style="width: 20px;"></span>
                    <span th:text="${appUser.phoneNumber}" style="color: #555;"></span>
                </li>
                <li class="mb-2 d-flex align-items-center">
                    <span class="fa fa-envelope-o mr-3 text-primary" style="width: 20px;"></span>
                    <span th:text="${appUser.email}" style="color: #555; font-size: 14px;"></span>
                </li>
            </ul>
            
            <div class="agent-social d-flex justify-content-center mb-4">
                <a href="#facebook" class="mx-2 text-muted hover-primary"><span class="fa fa-facebook"></span></a>
                <a href="#twitter" class="mx-2 text-muted hover-primary"><span class="fa fa-twitter"></span></a>
                <a href="#linkedin" class="mx-2 text-muted hover-primary"><span class="fa fa-linkedin"></span></a>
            </div>
            
            <button class="btn btn-outline-primary btn-block py-2 mb-2" style="border-radius: 6px; font-weight: 600;">Profilini Gör</button>
            <button class="btn btn-primary btn-block py-2" style="background: #f35e0a; border-color: #f35e0a; border-radius: 6px; font-weight: 600;">Mesaj Gönder</button>
        </div>
    </div>
</div>
