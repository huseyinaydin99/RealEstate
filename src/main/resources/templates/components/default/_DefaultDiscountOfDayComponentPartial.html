<section th:fragment="discountOfDay" class="w3l-news" id="discountOfDay">
    <div class="grids5-block py-5">
        <div class="container py-lg-5 py-md-4 py-2">
            <h3 class="title-big text-center">Günün Fırsatları</h3>
            <div class="row mt-lg-5 mt-4 pt-3">
                <div th:each="item : ${dealOfTheDayProducts}" class="col-lg-4 col-md-6 mt-md-0 mt-sm-4">
                    <div class="grids5-info">
                        <span class="posted-date">
                            <a th:href="@{'/property/' + ${item.getProductID()}}">
                                <span class="small" th:text="${item.getAdvertisementDate() != null ? #temporals.format(item.getAdvertisementDate(), 'yyyy') : ''}">Yıl</span>
                                <span class="big" th:text="${item.getAdvertisementDate() != null ? #temporals.format(item.getAdvertisementDate(), 'dd') : ''}">Gün</span>
                                <span class="small" th:text="${item.getAdvertisementDate() != null ? #temporals.format(item.getAdvertisementDate(), 'MMM') : ''}">Ay</span>
                            </a>
                        </span>
                        <a th:href="@{'/property/' + ${item.getProductID()}}" class="d-block zoom">
                            <img th:src="${item.getCoverImage()}" alt="" style="height:250px; width: 100%; object-fit: cover;" class="img-fluid news-image" />
                        </a>
                        <div class="blog-info">
                            <a th:href="@{'/property/' + ${item.getProductID()}}" class="category" th:text="${item.getCategoryName()}">Kategori</a>
                            <h4><a th:href="@{'/property/' + ${item.getProductID()}}" th:text="${item.getTitle()}">Başlık</a></h4>
                            <p th:text="${item.getDescription() != null && #strings.length(item.getDescription()) > 100 ? #strings.substring(item.getDescription(), 0, 100) + '...' : item.getDescription()}">Açıklama</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
