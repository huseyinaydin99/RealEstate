<section th:fragment="testimonial" class="w3l-index3" id="testimonials">
    <div class="midd-w3 py-5">
        <div class="container pb-lg-5 pb-md-4 pb-2">
            <div class="row">
                <div class="col-lg-5 pr-lg-0">
                    <div class="w3l-left-img1" style="background: url('/assets/images/testimonials.jpg') no-repeat 0px 0px; background-size: cover; height: 100%; min-height: 400px;">
                    </div>
                </div>
                <div class="col-lg-7 pl-lg-0">
                    <div class="w3l-right-info">
                        <h6 class="title-small">Referanslarımız</h6>
                        <div class="client-grid">
                            <div class="client-title">
                                <h3 class="title-big">Müşteri İlişkilerine Değer Veriyoruz.</h3>
                            </div>
                            <div class="clients-info">
                                <h3 class="title-big" th:text="${testimonials.size() + ' +'}">0 +</h3>
                                <p>Toplam Müşterimiz</p>
                            </div>
                        </div>
                        <div class="w3l-clients" id="testimonials-list">
                            <div th:each="item : ${testimonials}" class="item mt-4 pt-2 mb-4">
                                <div class="testimonial-content">
                                    <div class="testimonial">
                                        <div class="testi-des">
                                            <div class="peopl align-self">
                                                <h4 th:text="${item.nameSurname}">Ad Soyad</h4>
                                                <p class="indentity" th:text="${item.title}">Unvan</p>
                                            </div>
                                        </div>
                                        <blockquote>
                                            <q th:text="${item.comment}">Yorum</q>
                                        </blockquote>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="#agents" class="btn btn-style btn-primary mt-5">Acentamızla İletişime Geçin</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
