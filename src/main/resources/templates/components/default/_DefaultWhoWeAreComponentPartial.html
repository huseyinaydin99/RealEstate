<section th:fragment="whoWeAre" class="w3l-index3" id="about">
    <div class="midd-w3 pb-5">
        <div class="container pb-lg-5 pb-md-4 pb-2">
            <div class="row" th:each="detail : ${whoWeAreDetails}">
                <div class="col-lg-5 pr-lg-0">
                    <div class="w3l-left-img" style="background: url('/assets/images/about.jpg') no-repeat 0px 0px; background-size: cover;">
                    </div>
                </div>
                <div class="col-lg-7 pl-lg-0">
                    <div class="w3l-right-info">
                        <h6 class="title-small" th:text="${detail.title}">Biz Kimiz?</h6>
                        <h3 class="title-big" th:text="${detail.subTitle}">Vizyonumuz ve Misyonumuz</h3>
                        <p class="mt-4" th:text="${detail.description1}">
                            Açıklama 1
                        </p>
                        <p class="mt-3" th:text="${detail.description2}">
                            Açıklama 2
                        </p>
                        <ul class="w3l-right-book w3l-right-book-grid mt-md-5 mt-4">
                            <li th:each="service : ${services}">
                                <span class="fa fa-check" aria-hidden="true"></span>
                                <span th:text="${service.serviceName}">Hizmet Adı</span>
                            </li>
                        </ul>
                        <a href="/property" class="btn btn-style btn-primary mt-4">İlanları Görün</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
