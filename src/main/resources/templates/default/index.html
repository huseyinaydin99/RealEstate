<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/default_layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Ana Sayfa - RealEstate</title>
</head>
<body>
    <section class="w3l-cover-3">
        <div class="cover top-bottom">
            <div class="container">
                <div class="middle-section text-center">
                    <div class="section-width">
                        <p>Hayalinizdeki Eve Sahip Olun!</p>
                        <h2>Bugün Sizin İçin Doğru Evi Bulalım</h2>
                        <div class="most-searches"></div>
                        <form th:action="@{/property/search}" class="w3l-cover-3-gd" method="GET">
                            <input type="search" name="searchKeyValue" placeholder="Anahtar kelimeyi girin" required>
                            <span class="input-group-btn">
                                <select class="btn btn-default" name="propertyCategoryId" required>
                                    <option value="" selected disabled>Gayrimenkul Türü</option>
                                    <option th:each="category : ${categories}" th:value="${category.getCategoryID()}" th:text="${category.getCategoryName()}"></option>
                                </select>
                            </span>
                            <span class="input-group-btn">
                                <select class="btn btn-default" name="city" required>
                                    <option value="" selected disabled>Şehir Seçiniz</option>
                                    <option>İstanbul</option>
                                    <option>Düzce</option>
                                    <option>Ankara</option>
                                    <option>Bursa</option>
                                    <option>İzmir</option>
                                    <option>Antalya</option>
                                    <option>Paris</option>
                                    <option>Berlin</option>
                                    <option>Sofya</option>
                                </select>
                            </span>
                            <button type="submit" class="btn-primary">Ara</button>
                        </form>
                    </div>
                    <section id="bottom" class="demo">
                        <a th:href="@{/property}"><span></span>İlan Listesi</a>
                    </section>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{components/default/_DefaultProductListComponentPartial :: productList}"></div>
    <div th:replace="~{components/default/_DefaultWhoWeAreComponentPartial :: whoWeAre}"></div>
    <div th:replace="~{components/default/_DefaultBottomGridComponentPartial :: bottomGrid}"></div>
    <div th:replace="~{components/default/_DefaultPopularLocationComponentPartial :: popularLocation}"></div>
    <div th:replace="~{components/default/_DefaultTestimonialComponentPartial :: testimonial}"></div>
    <div th:replace="~{components/default/_DefaultDiscountOfDayComponentPartial :: discountOfDay}"></div>
</body>
</html>
