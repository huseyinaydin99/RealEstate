<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default_layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Bize Yazın</title>
</head>
<body>

<section class="w3l-about-breadcrumb">
    <div class="breadcrumb-bg breadcrumb-bg-about pt-5">
        <div class="container pt-lg-5 py-3">
        </div>
    </div>
</section>

<section class="w3l-breadcrumb">
    <div class="container">
        <ul class="breadcrumbs-custom-path">
            <li><a th:href="@{/}">Ana Sayfa</a></li>
            <li class="active"><span class="fa fa-angle-right mx-2" aria-hidden="true"></span> Bize Yazın</li>
        </ul>
    </div>
</section>

<section class="w3l-contact-7 pt-5" id="contact">
    <div class="contacts-9 py-lg-5 py-md-4">
        <div class="container">
            <div class="top-map">
                <div class="row map-content-9">
                    <div class="col-lg-8">
                        <div class="contact-form">
                            <h5 class="mb-2">Bizimle İletişime Geçin</h5>
                            <p class="mb-4">Her türlü soru, görüş ve önerileriniz için aşağıdaki formu doldurarak bize ulaşabilirsiniz.</p>
                            <form th:action="@{/contact/send}" method="post">
                                <div class="form-grid">
                                    <div class="input-field">
                                        <input type="text" name="name" id="name" placeholder="Adınız Soyadınız" required="">
                                    </div>
                                    <div class="input-field">
                                        <input type="email" name="email" id="email" placeholder="E-posta Adresiniz" required="">
                                    </div>
                                    <div class="input-field">
                                        <input type="text" name="subject" id="subject" placeholder="Konu" required="">
                                    </div>
                                </div>
                                <div class="input-field mt-4">
                                    <textarea name="message" id="message" placeholder="Mesajınız" required=""></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary btn-style mt-3">Gönder</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-lg-4 cont-details mt-lg-0 mt-5">
                        <address>
                            <h5 class="">İletişim Bilgileri</h5>
                            <p><span class="fa fa-map-marker"></span> İstanbul, Türkiye </p>
                            <p><a href="tel:+901234567890"><span class="fa fa-phone"></span> +(90) 123 456 78 90</a></p>
                            <p><a href="mailto:info@realestate.com" class="mail"><span class="fa fa-envelope-open-o"></span> info@realestate.com</a></p>
                        </address>
                        <div class="google-map mt-5">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3010.536643666063!2d28.974929315413!3d41.02563697929851!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cab9e7a775191f%3A0x851d3b3f4077f72e!2zR2FsYXRhIEt1bGVzaQ!5e0!3m2!1str!2str!4v1620000000000!5m2!1str!2str" frameborder="0" style="border:0" allowfullscreen=""></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
